<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Titan Core AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #000);
    color: white;
  }

  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
  }

  .neon {
    box-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff;
  }

  .sidebar {
    background: rgba(10,10,20,0.7);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255,255,255,0.1);
  }

  .tab {
    display: none;
  }

  .active {
    display: block;
  }

  .tool:hover {
    transform: scale(1.05);
    transition: 0.3s;
    box-shadow: 0 0 15px #00f5ff;
  }

  .msg-user {
    background: #10b981;
    margin-left: auto;
  }

  .msg-ai {
    background: #1f2937;
    margin-right: auto;
  }
</style>
</head>

<body class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<aside class="sidebar w-64 p-6 hidden md:block">
  <h1 class="text-2xl font-bold text-cyan-400 mb-8">⚡ TITAN CORE AI</h1>

  <button onclick="showTab('chat')" class="w-full text-left p-3 rounded hover:bg-gray-700">💬 Chat AI</button>
  <button onclick="showTab('tools')" class="w-full text-left p-3 rounded hover:bg-gray-700 mt-2">🧠 AI Tools</button>
  <button onclick="showTab('voice')" class="w-full text-left p-3 rounded hover:bg-gray-700 mt-2">🎙 Voice AI</button>

  <div class="mt-10 text-xs text-gray-400">
    SYSTEM STATUS: ONLINE ⚡
  </div>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6 overflow-y-auto">

<!-- HEADER -->
<div class="glass p-4 mb-6 text-center neon">
  <h2 class="text-3xl font-bold">Titan Core AI</h2>
  <p class="text-gray-400">Next Gen AI Operating System</p>
</div>

<!-- CHAT -->
<section id="chat" class="tab active">
  <div class="glass p-4 h-[500px] overflow-y-auto flex flex-col" id="chat-log"></div>

  <div class="flex mt-4 gap-2">
    <input id="user-input" class="flex-1 p-3 rounded bg-black text-white border border-gray-700" placeholder="Ask Titan AI..." />
    <button onclick="sendMessage()" class="px-6 bg-cyan-500 hover:bg-cyan-600 rounded font-bold">Send</button>
  </div>
</section>

<!-- TOOLS -->
<section id="tools" class="tab">
  <h2 class="text-2xl mb-4">AI Modules</h2>

  <div class="grid md:grid-cols-3 gap-4">

    <div class="glass tool p-4">🧠 Matrix AI</div>
    <div class="glass tool p-4">🤖 J.A.R.V.I.S AI</div>
    <div class="glass tool p-4">🛡 Guard AI</div>
    <div class="glass tool p-4">🎨 Anime AI</div>
    <div class="glass tool p-4">🎬 VidMorph AI</div>
    <div class="glass tool p-4">🧊 OneShot 3D</div>

  </div>
</section>

<!-- VOICE -->
<section id="voice" class="tab">
  <h2 class="text-2xl mb-4">Voice AI</h2>

  <button onclick="startListening()" class="px-6 py-3 bg-purple-600 rounded hover:bg-purple-700">
    🎙 Start Listening
  </button>

  <div id="voice-output" class="mt-4 text-gray-300"></div>
</section>

</main>

<script>
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function sendMessage(){
  const input = document.getElementById("user-input");
  const log = document.getElementById("chat-log");

  if(!input.value) return;

  log.innerHTML += `<div class='p-2 rounded msg-user w-fit'>${input.value}</div>`;

  const msg = input.value;
  input.value = "";

  log.innerHTML += `<div class='p-2 rounded msg-ai w-fit opacity-60'>Thinking...</div>`;
  log.scrollTop = log.scrollHeight;

  setTimeout(()=>{
    document.querySelector('.opacity-60').remove();
    log.innerHTML += `<div class='p-2 rounded msg-ai w-fit'>Titan AI Response: ${msg}</div>`;
  }, 800);
}

function startListening(){
  document.getElementById("voice-output").innerText = "🎧 Listening to voice...";
  setTimeout(()=>{
    document.getElementById("voice-output").innerText = "✔ Command received successfully.";
  }, 2000);
}

showTab('chat');
</script>

</body>
</html>
