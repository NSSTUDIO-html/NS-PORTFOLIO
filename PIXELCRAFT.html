<!DOCTYPE html>
<html>
<head>
<title>PIXELCRAFT ULTRA</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  display: flex;
  background: #1e1e2f;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #2b2b3d;
  padding: 10px;
  overflow-y: auto;
}

h3 { border-bottom: 1px solid #555; }

input, select, button {
  width: 100%;
  margin: 5px 0;
}

/* CANVAS AREA */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.canvas-box {
  position: relative;
  border: 2px dashed #666;
}

img {
  max-width: 700px;
  display: block;
}

/* TEXT */
.text {
  position: absolute;
  cursor: move;
  user-select: none;
  font-size: 30px;
}

/* CROP BOX */
.crop-box {
  position: absolute;
  border: 2px dashed red;
  pointer-events: none;
}

/* DRAW CANVAS */
.draw {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div class="sidebar">

<input type="file" onchange="loadImage(event)">

<h3>Filters</h3>
Brightness <input type="range" id="b" min="0" max="2" step="0.1" value="1">
Contrast <input type="range" id="c" min="0" max="2" step="0.1" value="1">
Grayscale <input type="range" id="g" min="0" max="1" step="0.1">
Sepia <input type="range" id="s" min="0" max="1" step="0.1">
Hue <input type="range" id="h" min="0" max="360">
Invert <input type="range" id="i" min="0" max="1" step="0.1">

<h3>Transform</h3>
<button onclick="rotate()">Rotate</button>
<button onclick="flipX()">Flip X</button>
<button onclick="flipY()">Flip Y</button>

<h3>Text</h3>
<input id="textVal" placeholder="Text">
<button onclick="addText()">Add Text</button>

<h3>Draw</h3>
<button onclick="enableDraw()">Draw Mode</button>
<button onclick="disableDraw()">Stop Draw</button>

<h3>Crop</h3>
<button onclick="startCrop()">Start Crop</button>
<button onclick="applyCrop()">Apply Crop</button>

<h3>Zoom</h3>
<input type="range" id="zoom" min="0.5" max="2" step="0.1" value="1">

<h3>Export</h3>
<button onclick="download()">Download</button>

</div>

<div class="main">
  <div class="canvas-box" id="box">
    <img id="img">
    <canvas id="drawCanvas" class="draw"></canvas>
    <div id="cropBox" class="crop-box"></div>
  </div>
</div>

<script>
let img = document.getElementById("img");
let box = document.getElementById("box");
let drawCanvas = document.getElementById("drawCanvas");
let ctx = drawCanvas.getContext("2d");

let rotation = 0, scaleX = 1, scaleY = 1;

/* LOAD IMAGE */
function loadImage(e){
  img.src = URL.createObjectURL(e.target.files[0]);
  setTimeout(()=>{
    drawCanvas.width = img.width;
    drawCanvas.height = img.height;
  },500);
}

/* FILTERS */
document.querySelectorAll("input[type=range]").forEach(x=>{
  x.oninput = apply;
});

function apply(){
  img.style.filter = `
    brightness(${b.value})
    contrast(${c.value})
    grayscale(${g.value})
    sepia(${s.value})
    hue-rotate(${h.value}deg)
    invert(${i.value})
  `;
  img.style.transform = `
    rotate(${rotation}deg)
    scale(${zoom.value * scaleX},${zoom.value * scaleY})
  `;
}

/* TRANSFORM */
function rotate(){ rotation+=90; apply(); }
function flipX(){ scaleX*=-1; apply(); }
function flipY(){ scaleY*=-1; apply(); }

/* TEXT */
function addText(){
  let t = document.createElement("div");
  t.className="text";
  t.innerText = textVal.value || "Text";
  t.style.top="50px"; t.style.left="50px";
  box.appendChild(t);
  drag(t);
}

function drag(el){
  el.onmousedown = e=>{
    let x=e.offsetX,y=e.offsetY;
    document.onmousemove = e=>{
      el.style.left = (e.pageX-box.offsetLeft-x)+"px";
      el.style.top = (e.pageY-box.offsetTop-y)+"px";
    }
    document.onmouseup=()=>document.onmousemove=null;
  }
}

/* DRAW */
let drawing=false;

function enableDraw(){
  drawCanvas.onmousedown = ()=>drawing=true;
  drawCanvas.onmouseup = ()=>drawing=false;
  drawCanvas.onmousemove = e=>{
    if(drawing){
      ctx.fillRect(e.offsetX,e.offsetY,3,3);
    }
  }
}

function disableDraw(){
  drawCanvas.onmousedown=null;
  drawCanvas.onmousemove=null;
}

/* CROP */
let cropStart=null;

function startCrop(){
  box.onmousedown = e=>{
    cropStart={x:e.offsetX,y:e.offsetY};
  }
  box.onmousemove = e=>{
    if(cropStart){
      cropBox.style.display="block";
      cropBox.style.left=cropStart.x+"px";
      cropBox.style.top=cropStart.y+"px";
      cropBox.style.width=(e.offsetX-cropStart.x)+"px";
      cropBox.style.height=(e.offsetY-cropStart.y)+"px";
    }
  }
  box.onmouseup=()=>cropStart=null;
}

function applyCrop(){
  alert("Crop visual only (advanced canvas crop next level)");
}

/* DOWNLOAD */
function download(){
  html2canvas(box).then(c=>{
    let a=document.createElement("a");
    a.download="pixelcraft.png";
    a.href=c.toDataURL();
    a.click();
  });
}
</script>

</body>
</html>
