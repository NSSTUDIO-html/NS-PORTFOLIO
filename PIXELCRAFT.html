<!DOCTYPE html>
<html>
<head>
<title>PIXELCRAFT PRO Editor</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #1e1e2f;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #2b2b3d;
  padding: 15px;
  overflow-y: auto;
}

.sidebar h3 {
  border-bottom: 1px solid #555;
  padding-bottom: 5px;
}

.control {
  margin: 10px 0;
}

input, select {
  width: 100%;
  padding: 5px;
}

/* MAIN AREA */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.canvas-box {
  position: relative;
  border: 2px dashed #666;
  padding: 10px;
}

img {
  max-width: 600px;
}

/* TEXT */
.text-overlay {
  position: absolute;
  top: 50px;
  left: 50px;
  font-size: 30px;
  cursor: move;
  user-select: none;
}

button {
  padding: 8px;
  margin-top: 5px;
  width: 100%;
  background: #4cafef;
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2c8ed6;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>PIXELCRAFT</h2>

  <div class="control">
    <input type="file" onchange="loadImage(event)">
  </div>

  <h3>Filters</h3>
  <div class="control">Brightness <input type="range" id="brightness" min="0" max="2" step="0.1" value="1"></div>
  <div class="control">Contrast <input type="range" id="contrast" min="0" max="2" step="0.1" value="1"></div>
  <div class="control">Blur <input type="range" id="blur" min="0" max="10"></div>

  <h3>Text</h3>
  <div class="control">
    <input type="text" id="textInput" placeholder="Enter text">
  </div>

  <div class="control">
    Font Size <input type="range" id="fontSize" min="10" max="100" value="30">
  </div>

  <div class="control">
    Color <input type="color" id="color">
  </div>

  <button onclick="addText()">Add Text</button>

  <h3>Actions</h3>
  <button onclick="downloadImage()">Download Image</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="canvas-box" id="canvasBox">
    <img id="image">
  </div>
</div>

<script>
let img = document.getElementById("image");
let canvasBox = document.getElementById("canvasBox");

/* LOAD IMAGE */
function loadImage(e) {
  const file = e.target.files[0];
  img.src = URL.createObjectURL(file);
}

/* FILTERS */
document.querySelectorAll("input[type=range]").forEach(slider => {
  slider.addEventListener("input", applyFilters);
});

function applyFilters() {
  img.style.filter = `
    brightness(${brightness.value})
    contrast(${contrast.value})
    blur(${blur.value}px)
  `;
}

/* ADD TEXT */
function addText() {
  const text = document.createElement("div");
  text.className = "text-overlay";
  text.innerText = textInput.value || "Sample";

  text.style.fontSize = fontSize.value + "px";
  text.style.color = color.value;

  makeDraggable(text);
  canvasBox.appendChild(text);
}

/* DRAG */
function makeDraggable(el) {
  let offsetX, offsetY;

  el.onmousedown = function(e) {
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    document.onmousemove = function(e) {
      el.style.left = (e.pageX - canvasBox.offsetLeft - offsetX) + "px";
      el.style.top = (e.pageY - canvasBox.offsetTop - offsetY) + "px";
    };

    document.onmouseup = function() {
      document.onmousemove = null;
    };
  };
}

/* DOWNLOAD */
function downloadImage() {
  html2canvas(canvasBox).then(canvas => {
    const link = document.createElement("a");
    link.download = "pixelcraft.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

<!-- LIBRARY -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
